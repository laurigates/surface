name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p surf-cli
      - name: Package
        run: tar -czf surf-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release surf
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: surf-${{ matrix.target }}.tar.gz
