name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p surf-cli
      - name: Package
        run: tar -czf surf-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release surf
      - name: Checksum
        # Per-asset SHA-256 so install.sh can verify integrity before installing (#39). macOS
        # ships `shasum`, Linux ships `sha256sum`; both emit `<hash>  <file>`.
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum surf-${{ matrix.target }}.tar.gz > surf-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 surf-${{ matrix.target }}.tar.gz > surf-${{ matrix.target }}.tar.gz.sha256
          fi
          cat surf-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            surf-${{ matrix.target }}.tar.gz
            surf-${{ matrix.target }}.tar.gz.sha256

  notify-site:
    name: trigger docs sync on surface-site
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to surface-site
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SURFACE_SITE_SYNC_TOKEN }}
          repository: Connorrmcd6/surface-site
          event-type: surface-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
