name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p surf-cli
      - name: Package
        run: tar -czf surf-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release surf
      - name: Checksum
        # Per-asset SHA-256 so install.sh can verify integrity before installing (#39). macOS
        # ships `shasum`, Linux ships `sha256sum`; both emit `<hash>  <file>`.
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum surf-${{ matrix.target }}.tar.gz > surf-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 surf-${{ matrix.target }}.tar.gz > surf-${{ matrix.target }}.tar.gz.sha256
          fi
          cat surf-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            surf-${{ matrix.target }}.tar.gz
            surf-${{ matrix.target }}.tar.gz.sha256

  npm-publish:
    name: publish npm channel
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read # download the release assets built by `build`
      id-token: write # npm publish --provenance attestation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Assemble platform packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          # Stamp the version + optionalDependencies pins across all npm packages.
          node npm/prepare.mjs "$version"
          # Pull the binaries this run just built and drop each into its platform package. The
          # tarball holds a bare `surf` at its root (see the Package step above).
          gh release download "$GITHUB_REF_NAME" -p 'surf-*.tar.gz' -D dist
          mkdir -p npm/surface-darwin-arm64/bin npm/surface-linux-x64/bin
          tar -xzf dist/surf-aarch64-apple-darwin.tar.gz -C npm/surface-darwin-arm64/bin
          tar -xzf dist/surf-x86_64-unknown-linux-gnu.tar.gz -C npm/surface-linux-x64/bin
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -eu
          # Platform packages first so the shim's optionalDependencies resolve immediately.
          npm publish --provenance --access public ./npm/surface-darwin-arm64
          npm publish --provenance --access public ./npm/surface-linux-x64
          npm publish --provenance --access public ./npm/surface

  notify-site:
    name: trigger docs sync on surface-site
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to surface-site
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SURFACE_SITE_SYNC_TOKEN }}
          repository: Connorrmcd6/surface-site
          event-type: surface-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
