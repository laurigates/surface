name: Surface
description: Run the Surface gate (surf check) to block merges when docs drift from code.
branding:
  icon: git-pull-request
  color: purple

# Consumers: a plain `actions/checkout@v4` is enough — do NOT set `fetch-depth: 0`.
# The verdict only needs the working tree; git history is used solely for the advisory
# old_code/magnitude enrichment in the JSON report. If you pass `check --base <ref>` to
# diff-scope the gate to changed files, fetch enough history to reach the merge base (a
# shallow `git fetch <ref>` is plenty) — still not `fetch-depth: 0`.

inputs:
  args:
    description: Arguments passed to surf (e.g. "check" or "check --format json").
    default: check
  version:
    description: Release tag to install (e.g. v0.1.0), or "latest".
    default: latest
  working-directory:
    description: Directory to run surf in (must contain or sit under a surf.toml).
    default: .

runs:
  using: composite
  steps:
    - name: Install surf
      shell: bash
      env:
        SURF_VERSION: ${{ inputs.version }}
        SURF_INSTALL_DIR: ${{ runner.temp }}/surf-bin
      # Run the installer bundled at the *pinned* action ref rather than the mutable
      # main branch, so a SHA-pinned `uses:` also pins the installer script
      # (defense-in-depth; install.sh already checksum-verifies the download).
      run: sh "${{ github.action_path }}/install.sh"
    - name: Run surf
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ runner.temp }}/surf-bin/surf ${{ inputs.args }}
